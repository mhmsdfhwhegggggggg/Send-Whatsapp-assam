# nginx/almossah.conf — Nginx config لـ AlMossah
# انسخه إلى: /etc/nginx/sites-available/almossah
# ثم: ln -s /etc/nginx/sites-available/almossah /etc/nginx/sites-enabled/
# ثم: nginx -t && systemctl reload nginx

# ── Rate limiting ─────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# ── Main server block ─────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;   # يُستبدل بالـ domain الفعلي بواسطة deploy.sh

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── API — reverse proxy إلى API Server ───────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # حد حجم الطلبات (CSV uploads)
        client_max_body_size 10M;
    }

    # ── تحديد rate للـ auth (منع brute force) ────────────────────────────
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Frontend — الملفات الثابتة ────────────────────────────────────────
    location / {
        root  /opt/almossah/artifacts/frontend/dist/public;
        index index.html;

        # SPA routing — إرجاع index.html لكل route
        try_files $uri $uri/ /index.html;

        # Cache للملفات الثابتة
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
            access_log  off;
        }
    }

    # ── Health check (للـ uptime monitoring) ─────────────────────────────
    location /health {
        access_log off;
        proxy_pass http://127.0.0.1:8080/api/health;
    }

    # ── حماية الملفات الحساسة ─────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~ \.(env|config|json)$ {
        deny all;
        return 404;
    }
}
